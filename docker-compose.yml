services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend

  backend:
      build:
        context: ./backend
      ports:
        - "5000:5000"
      volumes:
        - ./backend:/app
        - backend_node_modules:/app/node_modules
      environment:
        - MONGO_URI=mongodb://mongo:27017/homefinder
      depends_on:
        - mongo

  mongo:
      image: mongo:6.0
      ports:
        - "27017:27017"
      volumes:
        - mongo_data:/data/db

volumes:
  frontend_node_modules:
  backend_node_modules:
  mongo_data:
